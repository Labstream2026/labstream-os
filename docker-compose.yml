# ── Labstream OS · stack para el NAS Synology ──
# Levantar:   docker compose -p labstream-os up -d --build
# Migrar:     docker compose -p labstream-os exec app npx prisma migrate deploy
# Seed:       docker compose -p labstream-os exec app node prisma/seed.js   (fase 1+)
# Backup:     docker compose -p labstream-os exec postgres pg_dump -U labstream labstream_os > backup.sql

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      # Solo loopback del host: el contenedor escucha en 127.0.0.1:3200, no en 0.0.0.0.
      # El reverse proxy de DSM corre en el host y reenvía a localhost:3200 → os.labstreamsas.com.
      # Así un dispositivo de la LAN NO puede llegar directo al contenedor (saltándose el proxy)
      # y falsificar cabeceras para disparar los crons sin secreto. Es la frontera de seguridad real.
      - "127.0.0.1:3200:3000"
    environment:
      NODE_ENV: production
      # Todo el manejo de fechas del calendario asume hora de pared en UTC. Se fija
      # explícitamente para que NUNCA dependa del default del entorno: sin esto, correr
      # con otra TZ desplaza todas las horas de eventos (p.ej. -5h en Colombia).
      TZ: UTC
      DATABASE_URL: postgresql://labstream:${POSTGRES_PASSWORD:-changeme}@postgres:5432/labstream_os?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-cambia-esto}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://os.labstreamsas.com}
      STORAGE_DIR: /app/storage
      # Web Push (notificaciones del navegador en segundo plano). Genera tus claves con
      # `npx web-push generate-vapid-keys` y ponlas en el .env del NAS; si faltan, el
      # push del navegador simplemente queda desactivado (no rompe nada).
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:hola@labstream.co}
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      AUTHENTIK_PROVISION_DOMAIN: ${AUTHENTIK_PROVISION_DOMAIN:-labstreamsas.com}
      ONLYOFFICE_DOCS_URL: ${ONLYOFFICE_DOCS_URL:-}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      # URL con la que el contenedor de OnlyOffice descarga/guarda el documento
      # (la app vista DESDE OnlyOffice, no desde el navegador). Debe ser alcanzable
      # entre contenedores: la IP LAN del NAS, p.ej. http://192.168.1.50:3200.
      # Sin esto cae a NEXTAUTH_URL (dominio público) → suele dar "Error de descarga".
      ONLYOFFICE_CALLBACK_BASE: ${ONLYOFFICE_CALLBACK_BASE:-}
      # Dirección de OnlyOffice alcanzable DESDE la app, para bajar el archivo
      # editado al GUARDAR. La IP LAN del NAS + puerto de OnlyOffice (8088),
      # p.ej. http://192.168.1.50:8088. Sin esto el guardado da "No se ha podido
      # guardar" (la app no llega al dominio público docs.labstreamsas.com).
      ONLYOFFICE_INTERNAL_URL: ${ONLYOFFICE_INTERNAL_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      # Correo por Resend (API HTTP por 443) — esquiva el bloqueo de puertos SMTP.
      # Si está RESEND_API_KEY, se usa Resend en vez de SMTP.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      # Correo Synology MailPlus (SMTP) — alternativa si no se usa Resend
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # =false acepta el cert auto-firmado del NAS (correo local Synology)
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      # Synology Calendar (CalDAV) — sincronización interna del equipo
      CALDAV_URL: ${CALDAV_URL:-}
      CALDAV_USER: ${CALDAV_USER:-}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-}
      # =true acepta el cert auto-firmado del NAS (CalDAV local Synology)
      CALDAV_INSECURE_TLS: ${CALDAV_INSECURE_TLS:-false}
    volumes:
      - ./data/storage:/app/storage # archivos subidos (fase 2)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      # Red propia del stack (app ↔ postgres ↔ redis).
      default: {}
      # Red del Document Server de OnlyOffice: la app se une SOLO para que OnlyOffice
      # pueda descargar/guardar el doc llegando a la app por el alias `labstream-app:3000`
      # (callback). Así NO hace falta exponer el puerto 3200 a la LAN: los crons siguen
      # protegidos por el binding a 127.0.0.1. Mismo patrón que Mattermost↔OnlyOffice
      # pero por red Docker interna en vez de IP pública.
      onlyoffice:
        aliases:
          - labstream-app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: labstream
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: labstream_os
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labstream -d labstream_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis:/data

  # worker:  # ── fase 3: chat en tiempo real, FFmpeg, automatizaciones, IA ──
  #   build: .
  #   restart: unless-stopped
  #   command: ["node", "worker.js"]
  #   environment:
  #     DATABASE_URL: postgresql://labstream:${POSTGRES_PASSWORD:-changeme}@postgres:5432/labstream_os?schema=public
  #     REDIS_URL: redis://redis:6379
  #   depends_on: [postgres, redis]

networks:
  # Red propia del proyecto (labstream-os_default): app ↔ postgres ↔ redis.
  default:
  # Red EXTERNA del proyecto compose `onlyoffice` (el Document Server). YA existe en el
  # NAS (el DS corre aparte), por eso `external: true`. La app se cuelga de ella para que
  # OnlyOffice alcance el callback de la app sin abrir el puerto 3200 a la LAN.
  onlyoffice:
    external: true
    name: onlyoffice_default
