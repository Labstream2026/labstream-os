# ── Labstream OS · stack para el NAS Synology ──
# Levantar:   docker compose -p labstream-os up -d --build
# Migrar:     docker compose -p labstream-os exec app npx prisma migrate deploy
# Seed:       docker compose -p labstream-os exec app node prisma/seed.js   (fase 1+)
# Backup:     docker compose -p labstream-os exec postgres pg_dump -U labstream labstream_os > backup.sql

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3200:3000" # reverse proxy de DSM → os.labstreamsas.com
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://labstream:${POSTGRES_PASSWORD:-changeme}@postgres:5432/labstream_os?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-cambia-esto}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://os.labstreamsas.com}
      STORAGE_DIR: /app/storage
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      AUTHENTIK_PROVISION_DOMAIN: ${AUTHENTIK_PROVISION_DOMAIN:-labstreamsas.com}
      ONLYOFFICE_DOCS_URL: ${ONLYOFFICE_DOCS_URL:-}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
    volumes:
      - ./data/storage:/app/storage # archivos subidos (fase 2)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: labstream
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: labstream_os
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labstream -d labstream_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis:/data

