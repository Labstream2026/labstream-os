<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sin conexión · Labstream OS</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b0b0e; color: #f2f2f3;
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased; text-align: center; padding: 24px;
      }
      .card { max-width: 320px; }
      h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
      p { font-size: 14px; line-height: 1.6; color: #a1a1aa; margin: 0 0 20px; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #2563eb; color: #fff; font-size: 14px; font-weight: 600;
        padding: 11px 20px; border-radius: 10px;
      }
      .dot { width: 44px; height: 44px; margin: 0 auto; border-radius: 12px; background: #1a1a1f;
             display: flex; align-items: center; justify-content: center; font-size: 22px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot">📡</div>
      <h1>Sin conexión</h1>
      <p>No pudimos cargar Labstream OS. Revisa tu conexión a internet e inténtalo de nuevo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
